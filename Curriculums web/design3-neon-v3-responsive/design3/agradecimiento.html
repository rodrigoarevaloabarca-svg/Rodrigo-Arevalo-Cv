<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensaje Enviado | Rodrigo Arévalo</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="stylesheet" href="assets/css/agradecimiento.css">
</head>
<body>

  <!-- Aurora fondo -->
  <div class="aurora">
    <div class="aurora-blob b1"></div>
    <div class="aurora-blob b2"></div>
    <div class="aurora-blob b3"></div>
  </div>

  <!-- Toggle tema (esquina superior derecha) -->
  <button class="corner-toggle" id="themeToggle" aria-label="Cambiar tema">
    <span class="ti-dark">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </span>
    <span class="ti-light">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1"  x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1"  y1="12" x2="3"  y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
        <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
      </svg>
    </span>
  </button>

  <!-- Contenido central -->
  <main class="page-wrap">

    <!-- Check animado con anillo neon -->
    <div class="check-wrap">
      <div class="check-ring"></div>
      <div class="check-inner">
        <svg class="check-svg" viewBox="0 0 36 36">
          <polyline class="check-path" points="7,18 15,26 29,11"/>
        </svg>
      </div>
    </div>

    <h1 class="page-title">
      ¡Mensaje<br>
      <span class="grad">Recibido!</span>
    </h1>

    <p class="page-sub">
      Gracias por contactarme. He recibido tu mensaje correctamente y
      te responderé <strong>a la brevedad posible</strong>.
    </p>

    <a href="index.html" class="btn-back">
      <svg class="btn-arrow" viewBox="0 0 24 24">
        <polyline points="19 12 5 12"/>
        <polyline points="12 5 5 12 12 19"/>
      </svg>
      Volver al Portfolio
    </a>

    <!-- Cards de confirmación -->
    <div class="info-cards">
      <div class="info-card">
        <span class="info-card-icon ic-green">✓</span>
        Formulario enviado con éxito
      </div>
      <div class="info-card">
        <span class="info-card-icon ic-cyan">⚡</span>
        Respuesta en menos de 24h
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="page-footer">
    <span class="footer-logo">rodrigo.dev</span>
    <span class="footer-copy">© 2026 Rodrigo Arévalo · Chile 🇨🇱</span>
  </footer>

  <script src="assets/js/agradecimiento.js"></script>
</body>
</html>
